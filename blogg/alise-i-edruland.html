<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alise i Edruland – Trygg Sirkel</title>

<meta name="description" content="Alise i Edruland – en blogg om edring, om reisen til trygghet fra innsiden og ut.">

<link rel="icon" type="image/png" href="../logo.png">

<style>
body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:linear-gradient(180deg,#f8fbf9 0%,#edf4ef 100%);
color:#1f2f2d;
line-height:1.9;
}

.banner{
width:100%;
display:block;
}

.container{
max-width:900px;
margin:auto;
padding:30px 16px 70px;
}

.card{
background:white;
border:1px solid #dce9e1;
border-radius:26px;
box-shadow:0 18px 45px rgba(31,47,45,.10);
padding:34px;
margin-bottom:24px;
}

h1{
font-size:42px;
margin:0 0 12px;
color:#226c44;
line-height:1.2;
}

.subtitle{
font-size:21px;
color:#60716d;
margin-bottom:28px;
}

.placeholder{
font-size:22px;
font-weight:800;
color:#226c44;
}

.back-btn{
display:block;
width:100%;
background:linear-gradient(180deg,#3fb870,#2f8f5b);
color:white;
text-align:center;
text-decoration:none;
font-size:22px;
font-weight:900;
padding:20px;
border-radius:22px;
margin-top:26px;
box-shadow:0 12px 30px rgba(47,143,91,.28);
}

@media(max-width:700px){
.card{
padding:26px 20px;
}
h1{
font-size:34px;
}
.subtitle{
font-size:18px;
}
}
</style>
</head>

<body>

<img src="../alise-banner.png" class="banner" alt="Alise i Edruland banner">

<main class="container">

<div class="card">

<h1>Alise i Edruland</h1>

<p class="subtitle">
En blogg om edring, om reisen til trygghet – fra innsiden og ut.
</p>

<p class="placeholder">
Her kommer dine innlegg ❤️
</p>

<p>
Dette blir et sted for tekster om tilfriskning, ærlighet, uro, håp og livet uten rus.
</p>

<a href="/" class="back-btn">
← Tilbake til Trygg Sirkel
</a>

</div>

</main>

</body>
</html>
