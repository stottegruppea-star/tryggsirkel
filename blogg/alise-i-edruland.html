<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alise i Edruland – Trygg Sirkel</title>

<meta name="description" content="Alise i Edruland – tekster fra Trygg Sirkel om tilfriskning, ensomhet, håp, uro og livet uten rus.">

<meta property="og:title" content="Alise i Edruland – Trygg Sirkel">
<meta property="og:description" content="Tekster om tilfriskning, håp og livet uten rus.">
<meta property="og:image" content="https://www.tryggsirkel.no/alise-banner.png">
<meta property="og:type" content="website">

<link rel="icon" type="image/png" href="../logo.png">

<style>

:root{
--card:#ffffff;
--ink:#1f2f2d;
--muted:#60716d;
--green:#2f8f5b;
--green-dark:#226c44;
--border:#dce9e1;
--shadow:0 18px 45px rgba(31,47,45,.10);
--radius:26px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter, Arial, sans-serif;
background:linear-gradient(180deg,#f8fbf9 0%,#edf4ef 100%);
color:var(--ink);
line-height:1.9;
}

.hero{
background:
linear-gradient(rgba(23,49,45,.68),rgba(23,49,45,.84)),
url('../alise-banner.png');
background-size:cover;
background-position:center;
color:white;
padding:90px 20px;
text-align:center;
}

.hero-inner{
max-width:900px;
margin:auto;
}

.hero h1{
font-size:52px;
margin:0;
font-weight:900;
line-height:1.2;
}

.hero p{
font-size:22px;
margin-top:18px;
color:rgba(255,255,255,.92);
}

.container{
max-width:920px;
margin:auto;
padding:30px 16px 70px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:34px;
margin-bottom:24px;
}

.blog-title{
font-size:34px;
font-weight:900;
line-height:1.3;
margin-bottom:12px;
color:var(--green-dark);
}

.blog-meta{
font-size:15px;
color:var(--muted);
margin-bottom:26px;
}

.blog-text{
font-size:19px;
line-height:2;
color:#263633;
}

.back-btn{
display:inline-block;
margin-top:26px;
background:linear-gradient(180deg,#3fb870,#2f8f5b);
color:white;
text-decoration:none;
padding:18px 26px;
border-radius:18px;
font-weight:900;
font-size:18px;
box-shadow:0 10px 24px rgba(47,143,91,.25);
}

.placeholder{
text-align:center;
padding:30px 10px;
}

.placeholder h2{
font-size:38px;
margin-bottom:12px;
color:var(--green-dark);
}

.placeholder p{
font-size:20px;
color:var(--muted);
}

@media(max-width:700px){

.hero{
padding:70px 18px;
}

.hero h1{
font-size:38px;
}

.hero p{
font-size:19px;
}

.card{
padding:24px 20px;
}

.blog-title{
font-size:28px;
}

.blog-text{
font-size:18px;
line-height:1.9;
}

.placeholder h2{
font-size:30px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-inner">

<h1>Alise i Edruland</h1>

<p>
Tekster fra Trygg Sirkel
</p>

</div>

</section>

<main class="container">

<div class="card placeholder">

<h2>Her kommer innleggene ❤️</h2>

<p>
Denne bloggen blir en del av Trygg Sirkel.
</p>

<p>
Her kommer tekster om tilfriskning, uro, ensomhet, håp og livet uten rus.
</p>

<a href="/" class="back-btn">
← Tilbake til Trygg Sirkel
</a>

</div>

</main>

</body>
</html>
